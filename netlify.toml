[build]
  publish = "."
  functions = "netlify/functions"

[functions."fb-proxy"]
  timeout = 26

[functions."fb-chunk"]
  timeout = 26

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.fbcdn.net https://*.facebook.com; media-src 'self' blob:; connect-src 'self' https://graph.facebook.com https://graph-video.facebook.com;"
